<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JM Partners — Agents Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ── Token system ─────────────────────────────────────────── */
:root {
  --ground:     #EBF0F5;
  --surface:    #FFFFFF;
  --surface-2:  #F5F8FB;
  --border:     #D3DDE8;
  --text:       #1C2B3A;
  --text-muted: #5B7080;
  --accent:     #1B6CA8;
  --accent-dim: #E6EFF7;
  --ok:         #1A8050;
  --ok-bg:      #E6F4EE;
  --warn:       #B06A00;
  --warn-bg:    #FEF3E2;
  --danger:     #B71C1C;
  --danger-bg:  #FDECEA;
  --gray-bg:    #EEF1F4;
  --gray-text:  #607080;
  --mono:       'JetBrains Mono', monospace;
  --sans:       'Inter', sans-serif;
  --serif:      'Cormorant', serif;
}

/* ── Reset + Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--sans);
  background-color: var(--ground);
  color: var(--text);
  min-height: 100vh;
  /* Aesthetic risk: ledger-line texture as background */
  background-image: repeating-linear-gradient(
    transparent,
    transparent 27px,
    rgba(26,107,168,0.07) 27px,
    rgba(26,107,168,0.07) 28px
  );
  background-size: 100% 28px;
}

/* ── Header ───────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.header-wordmark {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 1.35rem;
  letter-spacing: 0.02em;
  color: var(--text);
}

.header-sub {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 999px;
  background: var(--ok-bg);
  color: var(--ok);
  transition: all 0.3s;
}
.status-pill.error { background: var(--danger-bg); color: var(--danger); }

.pulse {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--ok);
  animation: pulse 2s ease-in-out infinite;
}
.status-pill.error .pulse { background: var(--danger); animation: none; }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.refresh-info {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

/* ── Layout ───────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr 300px;
  grid-template-rows: auto 1fr;
  gap: 0;
  height: calc(100vh - 56px);
}

.col-timeline {
  grid-column: 1;
  grid-row: 1 / -1;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface);
}
.col-main {
  grid-column: 2;
  overflow-y: auto;
  padding: 24px;
}
.col-ecritures {
  grid-column: 3;
  border-left: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface);
}

/* ── Section label (eyebrow) ─────────────────────────────── */
.section-eyebrow {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 16px 20px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 10;
}

.section-count {
  font-family: var(--mono);
  font-size: 0.65rem;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 4px;
}

/* ── Pipeline header ─────────────────────────────────────── */
.pipeline-header {
  background: var(--surface);
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}

.pipeline-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.6rem;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 14px;
}

.pipeline-steps {
  display: flex;
  align-items: center;
  gap: 0;
}

.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  position: relative;
}

.step-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 500;
  background: var(--gray-bg);
  color: var(--gray-text);
  border: 1.5px solid var(--border);
  position: relative;
  z-index: 1;
  transition: all 0.3s;
}
.step-dot.has-docs { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
.step-line {
  position: absolute;
  top: 14px;
  left: calc(50% + 14px);
  right: calc(-50% + 14px);
  height: 1.5px;
  background: var(--border);
}
.step-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-top: 6px;
  text-align: center;
  letter-spacing: 0.04em;
}
.step-n {
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--accent);
  min-height: 16px;
  text-align: center;
}

/* ── Table ───────────────────────────────────────────────── */
.data-table {
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.data-table table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.data-table th {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--surface-2);
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}

.data-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--ground);
  vertical-align: middle;
  color: var(--text);
}

.data-table tr:last-child td { border-bottom: none; }

.data-table tr:hover td { background: var(--surface-2); }

.data-table .mono {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
}

/* ── Status badges ───────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.04em;
  font-weight: 500;
  white-space: nowrap;
}
.badge-ocr     { background: var(--gray-bg);   color: var(--gray-text); }
.badge-trier   { background: var(--warn-bg);    color: var(--warn); }
.badge-collab  { background: #FFF3E0;           color: #BF6000; }
.badge-sage    { background: var(--accent-dim); color: var(--accent); }
.badge-valide  { background: var(--ok-bg);      color: var(--ok); }
.badge-archive { background: var(--gray-bg);    color: var(--gray-text); }
.badge-ok      { background: var(--ok-bg);      color: var(--ok); }
.badge-erreur  { background: var(--danger-bg);  color: var(--danger); }
.badge-skipped { background: var(--gray-bg);    color: var(--gray-text); }

/* ── Timeline (journaux) ─────────────────────────────────── */
.timeline {
  padding: 12px 0;
}

.timeline-item {
  display: flex;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--ground);
  transition: background 0.15s;
  animation: slideIn 0.25s ease;
}
.timeline-item:hover { background: var(--surface-2); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}

.tl-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.tl-dot.ok      { background: var(--ok); }
.tl-dot.erreur  { background: var(--danger); }
.tl-dot.skipped { background: var(--gray-text); }

.tl-body { flex: 1; min-width: 0; }

.tl-action {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text);
  font-weight: 500;
  letter-spacing: 0.02em;
  margin-bottom: 2px;
}

.tl-contenu {
  font-size: 0.75rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.tl-time {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--border);
  margin-top: 3px;
}

/* ── Écritures ───────────────────────────────────────────── */
.ecriture-item {
  padding: 12px 20px;
  border-bottom: 1px solid var(--ground);
  font-size: 0.8rem;
}

.ecr-ref {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--accent);
  margin-bottom: 3px;
}

.ecr-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.ecr-journal {
  font-size: 0.72rem;
  color: var(--text-muted);
}

.ecr-montant {
  font-family: var(--mono);
  font-weight: 500;
  font-size: 0.85rem;
  color: var(--text);
}

/* ── Empty states ────────────────────────────────────────── */
.empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
}

.empty-icon {
  font-size: 1.6rem;
  margin-bottom: 8px;
  opacity: 0.4;
}

/* ── Error banner ────────────────────────────────────────── */
.error-banner {
  background: var(--danger-bg);
  border-bottom: 1px solid #F5BABA;
  padding: 10px 28px;
  font-size: 0.78rem;
  color: var(--danger);
  font-family: var(--mono);
  display: none;
}

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Reduced motion ──────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  .pulse, .timeline-item { animation: none; }
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    height: auto;
  }
  .col-timeline, .col-ecritures { border: none; border-top: 1px solid var(--border); }
  .col-main { padding: 16px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-wordmark">JM Partners</span>
    <span class="header-sub">/ agents live</span>
  </div>
  <div class="header-right">
    <span class="refresh-info" id="refresh-info">—</span>
    <div class="status-pill" id="status-pill">
      <span class="pulse"></span>
      <span id="status-text">Connexion…</span>
    </div>
  </div>
</header>

<!-- Error banner -->
<div class="error-banner" id="error-banner"></div>

<!-- Main layout -->
<div class="layout">

  <!-- Col 1 : Journaux (timeline) -->
  <div class="col-timeline">
    <div class="section-eyebrow">
      Journaux agents
      <span class="section-count" id="jrn-count">0</span>
    </div>
    <div class="timeline" id="timeline">
      <div class="empty"><div class="empty-icon">📋</div>En attente de logs…</div>
    </div>
  </div>

  <!-- Col 2 : Documents (pipeline principal) -->
  <div class="col-main">

    <!-- Pipeline steps -->
    <div class="pipeline-header">
      <div class="pipeline-title">Pipeline documents</div>
      <div class="pipeline-steps" id="pipeline-steps">
        <!-- injected by JS -->
      </div>
    </div>

    <!-- Table documents -->
    <div class="data-table">
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Statut</th>
            <th>Type</th>
            <th>Score OCR</th>
            <th>Mis à jour</th>
          </tr>
        </thead>
        <tbody id="docs-tbody">
          <tr><td colspan="5" class="empty">Chargement…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Col 3 : Écritures -->
  <div class="col-ecritures">
    <div class="section-eyebrow">
      Écritures
      <span class="section-count" id="ecr-count">0</span>
    </div>
    <div id="ecritures-list">
      <div class="empty"><div class="empty-icon">📝</div>Aucune écriture</div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://umentbvgavplnbyanhmy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtZW50YnZnYXZwbG5ieWFuaG15Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjMyOTgyMywiZXhwIjoyMDk3OTA1ODIzfQ.zg4tkECShdEZnksuW82TSSnvtMoYoJb7rPQuwlRLDk8';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Helpers ───────────────────────────────────────────────

const STATUT_META = {
  'en_attente_ocr':         { label: 'En attente OCR',  cls: 'badge-ocr'    },
  'a_trier':                { label: 'À trier',         cls: 'badge-trier'  },
  'en_attente_collaborateur':{ label: 'Attente collab', cls: 'badge-collab' },
  'a_saisir_sage':          { label: 'À saisir Sage',   cls: 'badge-sage'   },
  'valide':                 { label: 'Validé',          cls: 'badge-valide' },
  'archive':                { label: 'Archivé',         cls: 'badge-archive'},
};

const PIPELINE_ORDER = [
  { key: 'en_attente_ocr',          short: 'OCR'     },
  { key: 'a_trier',                 short: 'Triage'  },
  { key: 'en_attente_collaborateur',short: 'Collab'  },
  { key: 'a_saisir_sage',           short: 'Sage'    },
  { key: 'valide',                  short: 'Validé'  },
  { key: 'archive',                 short: 'Archivé' },
];

function badge(statut) {
  const m = STATUT_META[statut] || { label: statut, cls: 'badge-ocr' };
  return `<span class="badge ${m.cls}">${m.label}</span>`;
}

function badgeJournal(statut) {
  const cls = { ok: 'badge-ok', erreur: 'badge-erreur', skipped: 'badge-skipped' }[statut] || 'badge-skipped';
  return `<span class="badge ${cls}">${statut}</span>`;
}

function relTime(iso) {
  if (!iso) return '—';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60)   return `${Math.round(diff)}s`;
  if (diff < 3600) return `${Math.round(diff/60)}min`;
  return new Date(iso).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function fmt(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── Render pipeline steps ──────────────────────────────────

function renderPipeline(docs) {
  const counts = {};
  PIPELINE_ORDER.forEach(s => counts[s.key] = 0);
  docs.forEach(d => { if (counts[d.statut] != null) counts[d.statut]++; });

  const el = document.getElementById('pipeline-steps');
  el.innerHTML = PIPELINE_ORDER.map((step, i) => {
    const n = counts[step.key];
    const isLast = i === PIPELINE_ORDER.length - 1;
    return `
      <div class="step">
        ${!isLast ? '<div class="step-line"></div>' : ''}
        <div class="step-n">${n > 0 ? n : ''}</div>
        <div class="step-dot ${n > 0 ? 'has-docs' : ''}">${i + 1}</div>
        <div class="step-label">${step.short}</div>
      </div>`;
  }).join('');
}

// ── Render documents ───────────────────────────────────────

function renderDocs(docs) {
  const tbody = document.getElementById('docs-tbody');
  if (!docs.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">Aucun document en base</td></tr>';
    return;
  }
  tbody.innerHTML = docs.map(d => `
    <tr>
      <td><strong>${d.nom || '—'}</strong></td>
      <td>${badge(d.statut)}</td>
      <td class="mono">${d.type_document || '—'}</td>
      <td class="mono">${d.score_ocr != null ? (d.score_ocr * 100).toFixed(0) + '%' : '—'}</td>
      <td class="mono">${relTime(d.updated_at)}</td>
    </tr>`).join('');
}

// ── Render journaux ────────────────────────────────────────

function renderJournaux(rows) {
  document.getElementById('jrn-count').textContent = rows.length;
  const el = document.getElementById('timeline');
  if (!rows.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>En attente de logs…</div>';
    return;
  }
  el.innerHTML = rows.map(j => `
    <div class="timeline-item">
      <div class="tl-dot ${j.statut || 'skipped'}"></div>
      <div class="tl-body">
        <div class="tl-action">${j.type_action || '—'}</div>
        <div class="tl-contenu">${j.contenu || ''}</div>
        <div class="tl-time">${relTime(j.created_at)}</div>
      </div>
    </div>`).join('');
}

// ── Render écritures ───────────────────────────────────────

function renderEcritures(rows) {
  document.getElementById('ecr-count').textContent = rows.length;
  const el = document.getElementById('ecritures-list');
  if (!rows.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📝</div>Aucune écriture générée</div>';
    return;
  }
  el.innerHTML = rows.map(e => `
    <div class="ecriture-item">
      <div class="ecr-ref">${e.reference || e.id?.slice(0,8) || '—'}</div>
      <div class="ecr-row">
        <span class="ecr-journal">${e.journal || '—'}</span>
        <span class="ecr-montant">${fmt(e.montant_ttc)} €</span>
      </div>
      <div style="margin-top:4px">${badgeJournal(e.statut || 'skipped')}</div>
    </div>`).join('');
}

// ── Set status ─────────────────────────────────────────────

function setStatus(ok, msg) {
  const pill = document.getElementById('status-pill');
  const txt  = document.getElementById('status-text');
  pill.className = ok ? 'status-pill' : 'status-pill error';
  txt.textContent = msg;
}

function setError(msg) {
  const b = document.getElementById('error-banner');
  if (msg) { b.textContent = msg; b.style.display = 'block'; }
  else       { b.style.display = 'none'; }
}

// ── Fetch all data ─────────────────────────────────────────

async function loadAll() {
  try {
    const [docsRes, ecrRes, jrnRes] = await Promise.all([
      sb.table('documents').select('id,nom,statut,type_document,score_ocr,updated_at')
        .order('updated_at', { ascending: false }).limit(50),
      sb.table('ecritures').select('id,journal,reference,montant_ttc,statut')
        .order('created_at', { ascending: false }).limit(30),
      sb.table('journaux').select('id,type_action,statut,contenu,created_at')
        .order('created_at', { ascending: false }).limit(30),
    ]);

    if (docsRes.error) throw docsRes.error;

    renderPipeline(docsRes.data || []);
    renderDocs(docsRes.data || []);
    renderEcritures(ecrRes.data || []);
    renderJournaux(jrnRes.data || []);

    setStatus(true, 'Connecté');
    setError(null);

    const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('refresh-info').textContent = `Dernière MAJ ${now}`;
  } catch (err) {
    setStatus(false, 'Erreur connexion');
    setError(`Erreur Supabase : ${err.message || err}`);
  }
}

// ── Realtime subscriptions ────────────────────────────────

function subscribeRealtime() {
  sb.channel('dashboard')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'documents'  }, loadAll)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ecritures'  }, loadAll)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'journaux'   }, loadAll)
    .subscribe(status => {
      if (status === 'SUBSCRIBED') setStatus(true, 'Realtime actif');
    });
}

// ── Boot ──────────────────────────────────────────────────

loadAll();
subscribeRealtime();
setInterval(loadAll, 10000);   // fallback poll every 10s
</script>
</body>
</html>
