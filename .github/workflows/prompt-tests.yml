# .github/workflows/prompt-tests.yml
name: Prompt Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'tests/prompts/**'
      - 'apps/email_agent/**'
      - 'packages/prompts/**'

jobs:
  golden-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PromptFoo
        run: npm install -g promptfoo

      - name: Run golden tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: promptfoo eval --config tests/prompts/email_agent.yaml

      - name: Show results summary
        if: always()
        run: echo "Voir résultats détaillés ci-dessus dans 'Run golden tests'"